<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RIO Hero — pixel perfect</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anybody:wdth,wght@75..125,100..900&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { background:#ffffff; }
  body { overflow-x:hidden; }

  /* frame = viewport-width wrapper with the scaled height; clips the 1920px root */
  .frame { position:relative; width:100vw; overflow:hidden; }
  /* root = hero, design space 1920 x 1095 (menu 135 + pallete 960), scaled to width */
  #root { position:absolute; top:0; left:0; width:1920px; height:1095px; transform-origin:top left; }

  /* ---- Menu bar (1920 x 135, white) ---- */
  .menubar { position:absolute; left:0; top:0; width:1920px; height:135px; background:#fff; z-index:40; }
  .menubar .logo { position:absolute; left:36px; top:30px; width:121px; height:76px; }
  .menubar .logo img { width:100%; height:100%; display:block; }
  .menubar .menu { position:absolute; right:36px; top:66px; width:100px; height:44px; }
  .menubar .menu img { width:100%; height:100%; display:block; }

  /* ---- Pallete area (1920 x 960) under menu ---- */
  .pallete { position:absolute; left:0; top:135px; width:1920px; height:960px; overflow:hidden; }

  #stage { position:absolute; inset:0; z-index:20; }
  .icon { position:absolute; width:120px; height:120px; opacity:0; will-change:opacity,transform;
          transform:scale(.7); pointer-events:none; }
  .icon img { width:100%; height:100%; display:block; }

  /* hero heading (exported SVG, custom font), centered single line at design (120,383) */
  .heading { position:absolute; left:28px; top:323px; width:1848px; height:214px; z-index:1;
             pointer-events:none; }
  .heading > div { position:absolute; inset:0; }
  .heading svg { display:block; width:1848px; height:214px; overflow:visible; }

  /* outline layer: faint cobalt letterform that appears then fades out under the ink */
  .h-outline { opacity:0; }
  #root.intro .h-outline { animation:olin 2.2s ease .15s forwards; }
  @keyframes olin { 0%{opacity:0;} 22%{opacity:1;} 75%{opacity:1;} 100%{opacity:0;} }

  /* ink layer: black fill revealed left->right with a soft 150px bleeding edge (driven by --p via JS) */
  .h-fill { --p:0;
    -webkit-mask-image: linear-gradient(90deg, #000 calc(var(--p) * 2008px - 160px), transparent calc(var(--p) * 2008px));
            mask-image: linear-gradient(90deg, #000 calc(var(--p) * 2008px - 160px), transparent calc(var(--p) * 2008px));
    -webkit-mask-repeat:no-repeat; mask-repeat:no-repeat; }

  /* bottom paragraph (Anybody SemiBold), centered, design pos x508 y637 within pallete */
  .para { position:absolute; left:508px; top:637px; width:904px; z-index:30; pointer-events:none;
          font-family:'Anybody',sans-serif; font-weight:600; font-size:48px; line-height:50px;
          font-variation-settings:'wght' 600, 'wdth' 75;  /* wdth=75 = hẹp nhất Anybody cung cấp (ước lượng) */
          text-align:center; white-space:nowrap; color:#000; opacity:0; transform:translateY(18px); }
  #root.intro .para { animation:paraIn .9s cubic-bezier(.22,1,.36,1) 1.15s forwards; }
  @keyframes paraIn { to { opacity:1; transform:translateY(0); } }
</style>
</head>
<body>
  <div class="frame"><div id="root">
    <div class="menubar">
      <div class="logo"><img src="assets/logo.svg" alt="RIO" draggable="false"></div>
      <div class="menu"><img src="assets/menu.svg" alt="Menu" draggable="false"></div>
    </div>
    <div class="pallete" id="pallete">
      <div id="stage"></div>
      <div class="heading" id="heading"></div>
      <div class="para">We are here for a better world and you are a part of it.</div>
    </div>
  </div></div>

<script>
const R = 280;          // reveal radius (design px)
const MAX_SCALE = 1.55; // scale of icon nearest cursor
const EASE_IN = 0.30;   // fade-in speed
const EASE_OUT = 0.055; // fade-out speed (trailing delay)

const root = document.getElementById('root');
const stage = document.getElementById('stage');
const pallete = document.getElementById('pallete');
let items = [], scale = 1;
let mouse = { x:-9999, y:-9999, active:false };
let introDone = false; // icon hover reveal only after heading intro completes

const frame = document.querySelector('.frame');
function fit() {
  scale = window.innerWidth / 1920;
  root.style.transform = 'scale(' + scale + ')';
  frame.style.height = (1095 * scale) + 'px';
}
window.addEventListener('resize', fit);
fit();

fetch('layout.json').then(r => r.json()).then(data => {
  const t = data.tile;
  for (const ic of data.icons) {
    const el = document.createElement('div');
    el.className = 'icon';
    el.style.left = ic.x + 'px';
    el.style.top  = ic.y + 'px';
    const img = document.createElement('img');
    img.src = 'output/' + ic.n + '.svg';
    img.draggable = false;
    el.appendChild(img);
    stage.appendChild(el);
    items.push({ el, cx: ic.x + t/2, cy: ic.y + t/2, cur: 0 });
  }
  requestAnimationFrame(loop);
});

// pointer mapped into pallete (design) coords
pallete.addEventListener('mousemove', e => {
  const rect = pallete.getBoundingClientRect();
  mouse.x = (e.clientX - rect.left) / scale;
  mouse.y = (e.clientY - rect.top) / scale;
  mouse.active = true;
});
pallete.addEventListener('mouseleave', () => { mouse.active = false; });

function loop() {
  for (const it of items) {
    let target = 0;
    if (mouse.active && introDone) {
      const dx = it.cx - mouse.x, dy = it.cy - mouse.y;
      const d = Math.sqrt(dx*dx + dy*dy);
      if (d < R) { const t = 1 - d / R; target = t*t*(3-2*t); }
    }
    const k = target > it.cur ? EASE_IN : EASE_OUT;
    it.cur += (target - it.cur) * k;
    if (it.cur < 0.002) it.cur = 0;
    it.el.style.opacity = it.cur;
    it.el.style.transform = 'scale(' + (0.7 + (MAX_SCALE - 0.7) * it.cur) + ')';
  }
  requestAnimationFrame(loop);
}

// ---- heading "ink soak" intro ----
const easeInOut = p => p < 0.5 ? 4*p*p*p : 1 - Math.pow(-2*p+2,3)/2;
function soak() {
  const f = document.querySelector('.h-fill');
  if (!f) return;
  const DUR = 1750, DELAY = 350;
  const t0 = performance.now() + DELAY;
  (function step(now) {
    let p = (now - t0) / DUR;
    if (p < 0) p = 0; if (p > 1) p = 1;
    f.style.setProperty('--p', easeInOut(p));
    if (p < 1) requestAnimationFrame(step);
    else introDone = true;
  })(performance.now());
}

fetch('assets/heading.svg').then(r => r.text()).then(svg => {
  const head = document.getElementById('heading');
  const outline = document.createElement('div'); outline.className = 'h-outline'; outline.innerHTML = svg;
  const fill = document.createElement('div'); fill.className = 'h-fill'; fill.innerHTML = svg;
  const op = outline.querySelector('path');
  op.setAttribute('fill', 'none');
  op.setAttribute('stroke', '#1A2BE0');
  op.setAttribute('stroke-width', '1.1');
  head.appendChild(outline);
  head.appendChild(fill);
  requestAnimationFrame(() => { root.classList.add('intro'); soak(); });
});
</script>
</body>
</html>
