<body style="font-family:sans-serif;padding:12px;font-size:13px">
<div id="status">Đang tải...</div>
<script>
const BASE = 'http://127.0.0.1:8899';
(async () => {
  const s = document.getElementById('status');
  try {
    const map = await (await fetch(BASE + '/map_remaining.json')).json();
    const entries = Object.entries(map);
    const out = {};
    for (let i = 0; i < entries.length; i++) {
      const [rid, file] = entries[i];
      out[rid] = { file, svg: await (await fetch(BASE + '/output/' + encodeURIComponent(file))).text() };
      s.textContent = 'Tải SVG ' + (i + 1) + '/' + entries.length;
    }
    parent.postMessage({ pluginMessage: { type: 'fill', data: out } }, '*');
    s.textContent = 'Đã gửi dữ liệu, đang fill...';
  } catch (e) {
    s.textContent = 'Lỗi: ' + e.message + ' (server local chạy chưa?)';
    parent.postMessage({ pluginMessage: { type: 'error', message: e.message } }, '*');
  }
})();
</script>
</body>
